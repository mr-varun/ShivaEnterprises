<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#424242" />
    <title>User Login : Shiva</title>
    <link rel="shortcut icon" href="../../static/uploads/logo/icon.png" type="image/x-icon">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:400,100,300,500">
    <link rel="stylesheet" href="../../static/backend/usertemplate/assets/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="../../static/backend/usertemplate/assets/font-awesome/css/font-awesome.min.css">
    <link rel="stylesheet" href="../../static/backend/usertemplate/assets/css/form-elements.css">
    <link rel="stylesheet" href="../../static/backend/usertemplate/assets/css/style.css">
    <style type="text/css">
        body {
            background: linear-gradient(to right, #676767 0, #dadada 100%);
        }

        .top-content {
            position: relative;
        }

        .nopadding {
            border-right: 0px solid #ddd;
        }

        .loginradius {
            border-radius: 4px;
        }

        .btn-group-justified a.btn {
            font-size: 13px;
        }
    </style>
</head>

<body>
    <div class="top-content">
        <div class="inner-bg">
            <div class="container">
                <div class="row">
                    <div class="col-lg-4 col-md-4 col-sm-12 nopadding col-md-offset-4">
                        <div class="bgoffsetbg">
                            <div class="loginbg loginradius login390">
                                <div class="form-top">
                                    <div class="form-top-left logowidth">
                                        <a href="/index">
                                            <img src="../../static/uploads/logo/aa.png" />
                                        </a>
                                    </div>
                                </div>
                                <div class="form-bottom">
                                    <h3 class="font-white">User Registration</h3>
                                    <form action="" method="post">
                                        {% csrf_token %}
                                        <div class="form-group has-feedback">
                                            {{form.username.errors}}
                                            <input type="text" name="username" placeholder="Full Name" class="form-username form-control" autofocus autocapitalize="none" autocomplete="username" maxlength="150" required id="id_username">
                                            <span class="fa fa-envelope form-control-feedback"></span>
                                            <span class="text-danger"></span>
                                        </div>
                                        <div class="form-group has-feedback">
                                            {{form.email.errors}}
                                            <input type="text" name="email" placeholder="E-mail"
                                                class="form-username form-control" autofocus autocapitalize="none"
                                                autocomplete="username" maxlength="150" required id="id_email">
                                            <span class="fa fa-envelope form-control-feedback"></span>
                                            <span class="text-danger"></span>
                                        </div>
                                        <div class="form-group has-feedback">
                                            {{form.password1.errors}}
                                            <input type="password" name="password1" placeholder="New Password"
                                                class="form-password form-control" autocomplete="new-password"
                                                required id="id_password1">
                                            <span class="fa fa-lock form-control-feedback"></span>
                                            <span class="text-danger"></span>
                                        </div>
                                        <div class="form-group has-feedback">
                                            {{form.password2.errors}}
                                            <input type="password" name="password2" autocomplete="new-password" id="id_password2" 
                                                placeholder="Conform Password" class="form-password form-control" required>
                                            <span class="fa fa-key form-control-feedback"></span>
                                            <span class="text-danger"></span>
                                        </div>
                                        <button type="submit" class="btn">Sign Up</button>
                                    </form>

                                    <span
                                        style="text-align:center;font-weight:normal; font-size: 14px; display: block;padding-top: 5px">
                                        *Note: Select any one of user from mentioned above.
                                    </span>

                                    <p style="margin-top: 10px;">
                                        <a href="/" class="forgot pull-left">
                                            <i class="fa fa-empire"></i> Front Site</a>
                                        <a style="padding-right: 10px;" href="{% url 'ulogin' %}" class="forgot pull-right">
                                            <i class="fa fa-user"></i> User Login</a>
                                    </p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>


</html>
